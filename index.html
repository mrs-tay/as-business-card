<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danielle Boggio - Business Card</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

  :root {
    --berry: #6B212C;
    --branch: #685652;
    --snowflake: #DCE0E8;
    --mist: #8EA1AE;
    --pine: #27363F;
    --white: #FFFFFF;
    --card-width: 3.5in;
    --card-height: 2in;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 40px;
    padding: 40px 20px;
  }

  h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--branch);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: -20px;
  }

  .card {
    width: var(--card-width);
    height: var(--card-height);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.08);
    position: relative;
  }

  /* ── FRONT ── */
  .card-front {
    background: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .card-front .logo-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .card-front .logo-img {
    height: 62px;
    width: auto;
  }

  .card-front .tagline {
    font-size: 7.5px;
    font-weight: 600;
    color: var(--berry);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 12px;
  }

  .card-front .accent-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--berry) 0%, var(--berry) 60%, var(--mist) 100%);
  }

  /* ── BACK ── */
  .card-back {
    background: var(--white);
    display: flex;
    flex-direction: row;
  }

  .card-back .side-bar {
    width: 6px;
    background: linear-gradient(180deg, var(--berry) 0%, var(--pine) 100%);
    flex-shrink: 0;
  }

  .card-back .content {
    flex: 1;
    padding: 18px 16px 14px 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .card-back .person {
    margin-bottom: 6px;
  }

  .card-back .person .name {
    font-size: 15px;
    font-weight: 700;
    color: var(--pine);
    letter-spacing: 0.3px;
  }

  .card-back .person .title {
    font-size: 8.5px;
    font-weight: 600;
    color: var(--berry);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-top: 2px;
  }

  .card-back .contact-info {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .card-back .contact-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 7.5px;
    color: var(--branch);
    font-weight: 500;
  }

  .card-back .contact-row .icon {
    width: 11px;
    height: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-back .contact-row .icon svg {
    width: 11px;
    height: 11px;
    fill: var(--berry);
  }

  .card-back .qr-area {
    position: absolute;
    right: 14px;
    bottom: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .card-back .qr-area canvas,
  .card-back .qr-area img {
    width: 56px;
    height: 56px;
    border: 2px solid var(--mist);
    border-radius: 4px;
  }

  .card-back .qr-area .qr-label {
    font-size: 5.5px;
    color: var(--mist);
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .card-back .mini-logo {
    position: absolute;
    right: 14px;
    top: 16px;
    height: 22px;
    width: auto;
    opacity: 0.15;
  }

  /* ── PRINT ── */
  @media print {
    body {
      background: white;
      gap: 0.3in;
      padding: 0.5in;
    }
    h2 { display: none; }
    .card {
      box-shadow: none;
      border: 1px solid #ccc;
      page-break-inside: avoid;
    }
  }
</style>
</head>
